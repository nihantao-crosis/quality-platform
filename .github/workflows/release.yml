# 发版 — 推 v* tag 后在 Windows + macOS 构建、签更新包并发布 GitHub Release（含 latest.json）。
# 桌面端「帮助 → 检查更新」经 tauri-plugin-updater 读取 latest.json。
name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: '--bundles msi,nsis'
          - platform: macos-latest
            args: '--bundles app,dmg'
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: npm ci
      - run: npm test
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ''
        with:
          tagName: ${{ github.ref_name }}
          releaseName: '质量分析平台 ${{ github.ref_name }}'
          releaseBody: '安装包见 Assets。Windows: .msi / -setup.exe；macOS: .dmg。'
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

  # tauri-action 对 Tauri v2 的 latest.json 生成不可靠（Signature not found），自行构建
  updater-json:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Build and upload latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          gh release view "$TAG" -R "$REPO" --json assets \
            --jq '.assets[] | .name + "\t" + .url' > assets.tsv
          gh release download "$TAG" -R "$REPO" --pattern '*.sig' -D sigs
          WIN_URL=$(grep -m1 -P '\t.*setup\.exe$' assets.tsv | cut -f2 || true)
          MAC_URL=$(grep -m1 -P '\t.*app\.tar\.gz$' assets.tsv | cut -f2 || true)
          WIN_SIG=$(cat sigs/*setup.exe.sig 2>/dev/null || echo "")
          MAC_SIG=$(cat sigs/*app.tar.gz.sig 2>/dev/null || echo "")
          VERSION="${TAG#v}"
          python3 - "$VERSION" "$WIN_URL" "$WIN_SIG" "$MAC_URL" "$MAC_SIG" <<'PY'
          import json, sys, datetime
          v, wu, ws, mu, ms = sys.argv[1:6]
          platforms = {}
          if wu: platforms["windows-x86_64"] = {"signature": ws, "url": wu}
          if mu: platforms["darwin-aarch64"] = {"signature": ms, "url": mu}
          json.dump({
            "version": v,
            "notes": "见 GitHub Release 页面",
            "pub_date": datetime.datetime.now(datetime.timezone.utc).isoformat(),
            "platforms": platforms,
          }, open("latest.json", "w"), ensure_ascii=False, indent=2)
          PY
          cat latest.json
          gh release upload "$TAG" latest.json -R "$REPO" --clobber

  # 单文件便携版:一个 HTML,任意机器浏览器打开即用(零安装零网络)
  portable:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build:portable
      - name: Upload portable html
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mv dist-portable/index.html "quality-platform-portable-${GITHUB_REF_NAME#v}.html"
          gh release upload "$GITHUB_REF_NAME" quality-platform-portable-*.html -R "$GITHUB_REPOSITORY" --clobber
