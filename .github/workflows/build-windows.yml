# Windows 桌面端打包 — 产出 .msi (WiX) 与 .exe (NSIS) 安装包。
# 仅手动触发(workflow_dispatch)。日常发版由 release.yml 统一构建并上传 Windows 安装包到
# GitHub Release;本工作流保留作为独立产出到 Actions Artifacts 的备用手段,避免与 release
# 在每个 tag 上重复构建 Windows(以往双跑会多产生一份失败/成功通知)。
name: build-windows

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable action; Rust 1.88.0 below
        with:
          toolchain: 1.88.0

      - uses: swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8
        with:
          workspaces: src-tauri

      - name: Install frontend deps
        run: npm ci

      - name: Unit tests (statistics engine)
        run: npm test

      - name: Tauri build (msi + nsis)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ''
        run: npx tauri build --bundles msi,nsis

      - name: Upload installers
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: quality-platform-windows
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
