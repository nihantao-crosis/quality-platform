# Windows 桌面端打包 — 产出 .msi (WiX) 与 .exe (NSIS) 安装包。
# 触发：推 tag（v*）或手动 workflow_dispatch。
# 产物在 Actions 运行页的 Artifacts（quality-platform-windows）。
name: build-windows

on:
  workflow_dispatch:
  push:
    tags: ['v*']

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend deps
        run: npm ci

      - name: Unit tests (statistics engine)
        run: npm test

      - name: Tauri build (msi + nsis)
        run: npx tauri build --bundles msi,nsis

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: quality-platform-windows
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
