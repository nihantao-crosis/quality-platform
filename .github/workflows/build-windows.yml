# Windows 桌面端打包 — 产出 .msi (WiX) 与 .exe (NSIS) 安装包。
# 仅手动触发(workflow_dispatch)。日常发版由 release.yml 统一构建并上传 Windows 安装包到
# GitHub Release;本工作流保留作为独立产出到 Actions Artifacts 的备用手段,避免与 release
# 在每个 tag 上重复构建 Windows(以往双跑会多产生一份失败/成功通知)。
name: build-windows

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend deps
        run: npm ci

      - name: Unit tests (statistics engine)
        run: npm test

      - name: Tauri build (msi + nsis)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ''
        run: npx tauri build --bundles msi,nsis

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: quality-platform-windows
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
